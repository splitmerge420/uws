name: Security Audit

on:
  push:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock"]
  pull_request:
    branches: [main]
    paths: ["Cargo.toml", "Cargo.lock"]
  schedule:
    # Daily at 06:00 UTC — catches newly published advisories
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write

jobs:
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          cargo audit --json 2>&1 | tee audit-report.json || true
          # Surface high/critical in step summary
          echo "## Security Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if cargo audit --deny warnings 2>&1; then
            echo "✅ No vulnerabilities found." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ Vulnerabilities detected — see audit output above." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: audit-report.json
          category: cargo-audit
