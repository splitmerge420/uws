name: Auto-Milestone

on:
  pull_request:
    types: [labeled]
  issues:
    types: [labeled]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign-milestone:
    name: Assign milestone from label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = context.payload.label ? [context.payload.label.name] : [];
            if (labels.length === 0) return;

            // Map label → milestone title
            const labelToMilestone = {
              'area: microsoft':  'v0.2 — Alexandria (Microsoft Graph)',
              'area: apple':      'v0.3 — Apple Intents',
              'area: android':    'v0.4 — Android & Chrome',
              'aluminum':         'v1.0 — Aluminum OS',
            };

            const milestoneName = labelToMilestone[labels[0]];
            if (!milestoneName) return;

            // Look up the milestone number
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
            });

            const milestone = milestones.data.find(m => m.title === milestoneName);
            if (!milestone) {
              console.log(`Milestone "${milestoneName}" not found — create it in GitHub first.`);
              return;
            }

            const issueNumber = context.issue.number || context.payload.pull_request?.number;
            if (!issueNumber) return;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              milestone: milestone.number,
            });
            console.log(`Assigned milestone "${milestoneName}" to #${issueNumber}`);
