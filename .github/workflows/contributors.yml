name: Update Contributors

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  contributors:
    name: Update CONTRIBUTORS.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate CONTRIBUTORS.md
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: contribs } = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const rows = contribs
              .filter(c => c.type !== 'Bot')
              .map(c => `| [@${c.login}](${c.html_url}) | ${c.contributions} |`)
              .join('\n');

            const content = `# Contributors\n\n` +
              `Thank you to everyone who has contributed to **uws**!\n\n` +
              `| Contributor | Commits |\n` +
              `|---|---|\n` +
              `${rows}\n\n` +
              `*Auto-generated by the [Update Contributors](../.github/workflows/contributors.yml) workflow.*\n` +
              `*Last updated: ${new Date().toISOString().slice(0,10)}*\n`;

            const fs = require('fs');
            fs.writeFileSync('CONTRIBUTORS.md', content);
            console.log(`Wrote CONTRIBUTORS.md with ${contribs.length} contributors`);

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTORS.md
          if git diff --staged --quiet; then
            echo "No changes to CONTRIBUTORS.md"
          else
            git commit -m "chore: update CONTRIBUTORS.md [skip ci]"
            git push
          fi
