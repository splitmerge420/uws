name: Draft Release

# Automatically creates a GitHub Draft Release when a version tag is pushed.
# The release body is populated from the CHANGELOG.md changeset entry.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          VERSION="${{ steps.version.outputs.version }}"
          # Strip leading 'v' for changelog lookup
          VER="${VERSION#v}"
          NOTES=$(awk "/^## \\[?${VER}\\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md || echo "")
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write multiline output safely
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "uws ${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
