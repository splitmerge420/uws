name: Job Summaries

# Enriches GitHub Actions workflow summaries with structured output.
# Triggered as a workflow_run listener so it doesn't slow down the main CI job.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  summarize:
    name: Build CI Summary
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion != 'skipped'
    steps:
      - name: Write summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            const status = run.conclusion === 'success' ? '✅' : '❌';
            const duration = Math.round(
              (new Date(run.updated_at) - new Date(run.created_at)) / 1000
            );

            await core.summary
              .addHeading(`${status} CI Run — ${run.head_branch}`)
              .addTable([
                [{data: 'Field', header: true}, {data: 'Value', header: true}],
                ['Commit', run.head_sha.slice(0, 7)],
                ['Branch', run.head_branch],
                ['Result', run.conclusion],
                ['Duration', `${duration}s`],
                ['Actor', run.triggering_actor?.login ?? 'unknown'],
              ])
              .addLink('View run', run.html_url)
              .write();
