name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Fail the check if any vulnerable dependency is introduced
          fail-on-severity: moderate
          # Post a summary comment on the PR
          comment-summary-in-pr: always
          # Allow GPLv2 in addition to permissive licenses (uws itself is MIT)
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Unicode-DFS-2016, Unlicense, 0BSD
