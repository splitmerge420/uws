name: Kintsugi Weave (Regenerative IP Engine)

# This workflow enforces the Aluminum OS constitutional invariants at the
# repository level. It replaces passive CI with an active Kintsugi Engine:
#
#   1. Systemic Vulnerability Scan  — rejects extractive / busywork anti-patterns
#   2. Golden-Trace Provenance      — requires HITL signature on every PR commit
#   3. Swarm Commander Review       — batch-approves or rejects via `/uws swarm review`
#
# The Net-Positive Flourishing Metric (NPFM) gate ensures that no code lowering
# the regenerative value of the codebase can enter the main branch without a
# Human-in-the-Loop (HITL) cryptographic sign-off.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: kintsugi-${{ github.ref }}-${{ github.event.issue.number || 'pr' }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Systemic Vulnerability Scan (NPFM Anti-Busywork Gate)
  #
  # Runs the Aluminum OS Invariant Linter against the incoming codebase.
  # If the linter detects extractive anti-patterns that lower the NPFM, the
  # CI fails and blocks the merge until the author remedies the violations.
  # ────────────────────────────────────────────────────────────────────────────
  systemic_linter:
    name: NPFM Anti-Busywork Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linter dependencies
        run: pip install --quiet dataclasses 2>/dev/null || true

      - name: Identify changed files in PR
        id: changed
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "${BASE_REF}" --depth=1
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD" \
            | grep -E '\.(rs|py|ts|js)$' | tr '\n' ' ' || true)
          echo "files=${CHANGED}" >> "$GITHUB_OUTPUT"

      - name: Execute Systemic Linter on changed files (uws scan equivalent)
        run: |
          echo "Running Aluminum OS Invariant Linter (NPFM gate) on changed files..."
          FILES="${{ steps.changed.outputs.files }}"
          if [ -z "$FILES" ]; then
            echo "No source files changed — skipping linter."
            exit 0
          fi
          FAIL=0
          for FILE in $FILES; do
            [ -f "$FILE" ] || continue
            echo "Scanning: $FILE"
            python3 toolchain/invariant_linter.py "$FILE" --strict && true || FAIL=1
          done
          if [ "$FAIL" -eq 1 ]; then
            echo "::error::Systemic linter found critical invariant violations in PR changes."
            exit 1
          fi
          echo "✅ All changed files passed the NPFM anti-busywork scan."
        # Exit code 1 → critical invariant violations in PR-changed files → blocks merge

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Cryptographic Provenance Validation (Golden-Trace HITL check)
  #
  # Scans every commit in the PR for a valid "Golden-Trace: HITL=" trailer.
  # Commits that lack human-in-the-loop provenance are rejected, enforcing
  # the principle that no autonomous AI agent can merge code unilaterally.
  # ────────────────────────────────────────────────────────────────────────────
  provenance_validation:
    name: Golden-Trace (HITL) Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code with full commit history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Golden-Trace trailers on PR commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          echo "Scanning PR commits for Human-In-The-Loop (HITL) provenance..."

          COMMITS=$(git rev-list "origin/${BASE_REF}..HEAD" 2>/dev/null || \
                    git rev-list HEAD~1..HEAD)

          if [ -z "$COMMITS" ]; then
            echo "No commits found to validate."
            exit 0
          fi

          FAIL=0
          for COMMIT in $COMMITS; do
            MESSAGE=$(git log --format=%B -n 1 "$COMMIT")
            if echo "$MESSAGE" | grep -q "Golden-Trace: HITL="; then
              echo "✅ $COMMIT — valid HITL provenance found"
            else
              echo "❌ $COMMIT — missing 'Golden-Trace: HITL=' trailer"
              echo "   Commit message preview:"
              echo "$MESSAGE" | head -3 | sed 's/^/     /'
              FAIL=1
            fi
          done

          if [ "$FAIL" -eq 1 ]; then
            echo ""
            echo "::error::One or more commits are missing a Golden-Trace HITL trailer."
            echo "Add the following trailer to each commit message:"
            echo "  Golden-Trace: HITL=<weight>, Signature=<hash>"
            echo ""
            echo "Example:"
            echo "  Golden-Trace: HITL=0.90, Signature=sha3-a1b2c3d4"
            exit 1
          fi

          echo ""
          echo "✅ All commits contain valid Human-In-The-Loop provenance."

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3: Swarm Commander Automation (triggered by /uws swarm review comment)
  #
  # When a contributor (or AI agent) comments "/uws swarm review" on a PR,
  # the Swarm Commander fetches a batch of items, runs the NPFM check, and
  # either auto-merges (score ≥ threshold) or posts a rejection comment.
  #
  # Requires write permission on contents + pull-requests for auto-merge.
  # ────────────────────────────────────────────────────────────────────────────
  swarm_commander:
    name: Swarm Review Execution
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/uws swarm review')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Execute Swarm Commander batch review
        id: swarm
        run: |
          set -euo pipefail
          echo "Swarm Commander activating — batch review in progress..."
          python3 toolchain/swarm_review.py --batch 1 --json > /tmp/swarm_report.json
          echo "--- Swarm Report ---"
          cat /tmp/swarm_report.json

          APPROVED=$(python3 -c "
          import json, sys
          r = json.load(open('/tmp/swarm_report.json'))
          print('true' if r['batch_approved'] else 'false')
          ")
          NPFM=$(python3 -c "
          import json, sys
          r = json.load(open('/tmp/swarm_report.json'))
          print(r['overall_npfm'])
          ")
          SIG=$(python3 -c "
          import json, sys
          r = json.load(open('/tmp/swarm_report.json'))
          print(r['swarm_signature'])
          ")
          echo "batch_approved=${APPROVED}" >> "$GITHUB_OUTPUT"
          echo "npfm=${NPFM}" >> "$GITHUB_OUTPUT"
          echo "swarm_sig=${SIG}" >> "$GITHUB_OUTPUT"

      - name: Post swarm review result as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/swarm_report.json'));
            const approved = report.batch_approved;
            const npfm = report.overall_npfm;
            const sig = report.swarm_signature;

            const icon = approved ? '✅' : '❌';
            const verdict = approved ? 'APPROVED' : 'REJECTED';

            const body = [
              `### ${icon} Swarm Commander Review — ${verdict}`,
              '',
              `**Overall NPFM Score:** \`${npfm}\``,
              `**Swarm Signature:** \`${sig}\``,
              `**Items reviewed:** ${report.items_reviewed}`,
              '',
              approved
                ? '> The batch meets the Net-Positive Flourishing Metric threshold. Proceeding with merge.'
                : '> The batch does not meet the NPFM threshold. Please address the violations below.',
              '',
              '| Item | NPFM | Status | HITL |',
              '|------|------|--------|------|',
              ...report.items.map(i => {
                const s = i.approved ? '✅' : '❌';
                const h = i.hitl_required ? 'Required' : 'Optional';
                return `| \`${i.item_id.slice(0,8)}\` ${i.description.slice(0,40)} | ${i.npfm_score} | ${s} | ${h} |`;
              }),
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Auto-merge if Swarm Commander approves
        if: steps.swarm.outputs.batch_approved == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "Swarm Commander approved (NPFM=${{ steps.swarm.outputs.npfm }}). Merging PR #${PR_NUMBER}..."
          gh pr merge "${PR_NUMBER}" --merge --admin \
            --body "Auto-merged by Swarm Commander (NPFM=${{ steps.swarm.outputs.npfm }}, sig=${{ steps.swarm.outputs.swarm_sig }})"

      - name: Fail job if Swarm Commander rejects
        if: steps.swarm.outputs.batch_approved == 'false'
        run: |
          echo "::error::Swarm Commander rejected the batch. NPFM score ${{ steps.swarm.outputs.npfm }} is below threshold."
          exit 1
