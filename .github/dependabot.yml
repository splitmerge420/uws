# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
#
# Keeps GitHub Actions pinned to their latest versions and Cargo
# dependencies up to date. Each PR is labelled and limited to 5/week
# to avoid CI noise.

version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "area: ci"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # ── Cargo (Rust) ─────────────────────────────────────────────────────────────
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "area: core"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5
    # Group minor/patch updates together to reduce PR noise
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ── npm (pnpm) ───────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    labels:
      - "dependencies"
      - "area: distribution"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 3
