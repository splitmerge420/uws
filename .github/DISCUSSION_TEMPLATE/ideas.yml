name: Ideas & Feature Proposals
description: Propose a new provider, command, or Aluminum OS capability
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        **Thanks for proposing an improvement to uws!**
        Use this form to propose new features, integrations, or architectural ideas.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: "I often need to... but uws doesn't support..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the ideal command or feature look like?
      placeholder: |
        uws notion pages list --params '{"database_id": "..."}'
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Which provider or ecosystem does this involve?
      options:
        - Google Workspace
        - Microsoft 365
        - Apple iCloud
        - Android
        - Chrome
        - New provider (Notion, Slack, Linear, Zoom, etc.)
        - Aluminum OS (cross-provider abstraction)
        - Infrastructure / Developer Experience
        - AI Agent / MCP integration
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other tools, workarounds, or approaches you've tried.

  - type: textarea
    id: agent-use-case
    attributes:
      label: AI agent use case (optional)
      description: If this is primarily for use by AI agents, describe the agent's workflow.
