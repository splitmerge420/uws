name: Bug Report
description: Something doesn't work as expected
labels: ["bug", "needs-triage"]
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      description: Which provider (service) does this affect?
      options:
        - Google Workspace (drive, gmail, calendar, etc.)
        - Microsoft 365 (ms-mail, ms-calendar, ms-onedrive, etc.)
        - Apple iCloud (apple-calendar, apple-contacts, etc.)
        - GitHub (github)
        - Android (android-management, android-messages)
        - Chrome (chrome-management, chrome-policy)
        - Auth / Setup (uws auth, uws ms-auth)
        - Core / CLI parsing
        - Other
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command that failed
      description: Paste the full `uws` command (redact any tokens/secrets)
      placeholder: "uws github issues list --params '{\"owner\":\"octocat\",\"repo\":\"Hello-World\"}'"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output or error
      description: What did `uws` actually do?
      render: text
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: uws version
      description: Run `uws --version` and paste the output
      placeholder: "uws 0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Windows (x86_64)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (logs, screenshots, related issues)
