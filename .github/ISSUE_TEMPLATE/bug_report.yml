name: 🐛 Bug Report
description: Something broke. Let's fix it.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Before submitting, please check [existing issues](https://github.com/splitmerge420/uws/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what went wrong.
      placeholder: "When I run `uws ...`, instead of X happening, Y happens."
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command Run
      description: The exact uws command that failed. Redact any credentials.
      placeholder: |
        uws gmail users messages list --params '{"userId":"me"}'
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Paste the full output, including stderr.
      render: text
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider / Ecosystem
      description: Which provider is this bug in?
      options:
        - Google Workspace
        - Microsoft 365
        - Apple iCloud
        - Android Management
        - Chrome Policy
        - Authentication (uws auth)
        - Core CLI / Discovery
        - MCP Server
        - Skills
        - Install / Distribution
        - Other / Multiple
    validations:
      required: true

  - type: input
    id: uws-version
    attributes:
      label: uws Version
      description: Output of `uws --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (ARM64)
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Windows (WSL)
        - Windows (native)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have redacted any credentials or sensitive data.
          required: true
