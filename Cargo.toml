[package]
name = "uws"
version = "0.1.0"
edition = "2021"
authors = ["Dave Sheldon <splitmerge420@gmail.com>"]
description = "Universal Workspace CLI — Constitutional operating system for AI-augmented life"
license = "MIT"
repository = "https://github.com/splitmerge420/uws"
readme = "README.md"

[lib]
name = "uws"
path = "src/lib.rs"

[[bin]]
name = "uws"
path = "src/main.rs"

[features]
default = ["std"]
# "std" pulls in serde so constitutional_engine.rs can derive Serialize/Deserialize
std = ["serde", "sha3", "serde_json"]

[dependencies]
serde = { version = "1", features = ["derive"], optional = true }
sha3 = { version = "0.10", optional = true }   # Real SHA3-256 for audit_chain.rs
serde_json = { version = "1", optional = true } # JSON export for audit chain

# Phase 3 (uncomment when async runtime is needed):
# reqwest = { version = "0.12", features = ["json"] }  # GitHub API calls
# tokio = { version = "1", features = ["full"] }        # Async runtime
# clap = { version = "4", features = ["derive"] }       # CLI argument parsing

[dev-dependencies]
# Tests use only std for now

[profile.release]
opt-level = 3
lto = true
strip = true